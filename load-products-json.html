<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User <details></details></title>
</head>
<body>
    <h3>Fetch Products Example</h3>
    <button onclick="loadproducts()">Load Poducts</button>
    <div id="output"></div>
    <script>
        function loadproducts(){
            fetch("https://fakestoreapi.com/products")
            .then((response)=>response.json())
            .then((products)=>{
                let html="<h2>Product List</h2>";
                products.slice(0,20).forEach((product)=>{
                    html+=
                    "<strong>"+
                    product.title+
                    "</strong><br>"+"<h1>"+
                    "price : "+
                    product.price+
                    "</h1><br><br>" +
                    "<img src='"+product.image+"'><br>";
                });
                document.getElementById("output").innerHTML=html;
            })
            .catch((error)=>{
                console.log(error);
            });
        }
    </script>
</body>
</html>
