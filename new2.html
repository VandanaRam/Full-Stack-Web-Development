<!DOCTYPE html>
<html>
<head>
 <title>Fetch User API</title>
 <style>
 body{
 font-family: Arial, Helvetica, sans-serif;
 padding: 20px;
 background: #d4e7f9;
 }
 h1{
 color: red;
 }
 button{
 padding: 10px 20px;
 background-color: rgb(13, 197, 244);
 color: white;
 border:none;
 cursor: pointer;
 border-radius: 5px;
 margin-bottom: 20px;
 }
 button:hover{
 background-color: red;
 }
 table{
 width: 100%;
 border-collapse: collapse;
 background: white;
 }
 th, td{
 border: 1px solid #ccc;
 padding: 10px;
 text-align: left;
 vertical-align: top;
 font-size: 14px;
 }
 th{
 background-color: black;
 color: white;
 }
 tr:nth-child(even){
 background: #f9fafb;
 }
 </style>
</head>
<body>
 <h1>Fetch Users Example</h1>
 <button onclick="loadUsers()">Load Users</button>
 <div id="output"></div>
 <script>
 function loadUsers(){
 fetch("https://jsonplaceholder.typicode.com/users")
 .then(function (response){
 return response.json();
 })
 .then(function (users){
 let result = "<h2>User Details</h2>";
 result += `
 <table>
 <tr>
 <th>ID</th>
 <th>Name</th>
 <th>Username</th>
 <th>Email</th>
 <th>Phone</th>
 <th>Website</th>
 <th>Address</th>
 <th>Geo Location</th>
 <th>Company</th>
 </tr>
 `;
 users.forEach(function (user){
 result +=`
 <tr>
 <td>${user.id}</td>
 <td>${user.name}</td>
 <td>${user.username}</td>
 <td>${user.phone}</td>
 <td>${user.website}</td>
 <td>
 <strong>Street:</strong>${user.address.street}<br/>
 <strong>Suite:</strong>${user.address.suite}<br/>
 <strong>City:</strong>${user.address.city}<br/>
 <strong>Zipcode:</strong>${user.address.zipcode}<br/>
 </td>
 <tr/>
 `;
 });
 result += "</table>";
 document.getElementById("output").innerHTML = result;
 })
 .catch(function (error){
 document.getElementById("output").innerHTML =
 "<p>Something Went Wrong</p>";
 console.log(error);
 });
 }
 </script>
</body>
</html>
